version: '3.9'

services:
  sport-scorses:
    container_name: sport-scorses-php
    build: .
    volumes:
      - './api/:/var/www/html'
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      DATABASE_URL: pgsql://symfony:symfony@db:5432/symfony
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
    depends_on:
      - db
      - rabbitmq

  db:
    container_name: sport-scorses-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: symfony
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
    ports:
      - "5432:5432"

  rabbitmq:
    container_name: sport-scorses-rabbit
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
