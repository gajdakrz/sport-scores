services:
  sport-scores:
    container_name: sport-scores-php
    build: .
    volumes:
      - './api/:/var/www/html'
    ports:
      - '8080:80'
    environment:
      APP_ENV: dev
      DATABASE_URL: pgsql://admin:1234@db:5432/sport-scores-db
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
    depends_on:
      - db
      - rabbitmq

  db:
    container_name: sport-scores-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: sport-scores-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"

  rabbitmq:
    container_name: sport-scores-rabbit
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'

  node:
    container_name: sport-scores-node
    image: node:20
    working_dir: /var/www/html
    volumes:
      - './api/:/var/www/html'
    tty: true
    stdin_open: true
    command: sh -c "npm install && npm run watch"
